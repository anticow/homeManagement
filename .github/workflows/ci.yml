name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  HELM_VERSION: '3.17.2'

jobs:
  security-guards:
    name: Security Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run host logging guard
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/Test-HostLoggingGuards.ps1

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test
          --no-build
          --configuration Release
          --filter "Category!=Platform"
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan for vulnerable NuGet packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/vuln-report.txt
          if grep -q "has the following vulnerable packages" /tmp/vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected. Review /tmp/vuln-report.txt"
            grep -A5 "has the following vulnerable packages" /tmp/vuln-report.txt
            exit 1
          fi
          echo "No vulnerable packages found."

  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint chart
        run: >-
          helm lint deploy/helm/homemanagement
          --set database.connectionString="Server=sql;Database=HomeManagement;User Id=sa;Password=ValidationPassword_123!;Encrypt=True;TrustServerCertificate=False;"
          --set auth.jwtSigningKey="validation-signing-key-that-is-long-enough-for-ci-checks-1234567890"
          --set agentGateway.apiKey="validation-agent-gateway-api-key"

      - name: Verify chart fails without required secret values
        run: >-
          ! helm template homemanagement deploy/helm/homemanagement

      - name: Render chart
        run: >-
          helm template homemanagement deploy/helm/homemanagement
          --set database.connectionString="Server=sql;Database=HomeManagement;User Id=sa;Password=ValidationPassword_123!;Encrypt=True;TrustServerCertificate=False;"
          --set auth.jwtSigningKey="validation-signing-key-that-is-long-enough-for-ci-checks-1234567890"
          --set agentGateway.apiKey="validation-agent-gateway-api-key"
          > /tmp/homemanagement-rendered.yaml

      - name: Verify rendered chart is non-empty
        run: test -s /tmp/homemanagement-rendered.yaml

  docker-build-validate:
    name: Docker Build Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - repository: hm-agent
            dockerfile: docker/agent.Dockerfile
          - repository: hm-broker
            dockerfile: docker/broker.Dockerfile
          - repository: hm-auth
            dockerfile: docker/auth.Dockerfile
          - repository: hm-web
            dockerfile: docker/web.Dockerfile
          - repository: hm-gateway
            dockerfile: docker/gateway.Dockerfile
          - repository: hm-agent-gw
            dockerfile: docker/agent-gw.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Microsoft Container Registry
        uses: docker/login-action@v3
        with:
          registry: mcr.microsoft.com

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.repository }}:ci
          cache-from: type=gha,scope=${{ matrix.repository }}
          cache-to: type=gha,mode=max,scope=${{ matrix.repository }}

  platform-smoke-tests:
    name: Platform Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [security-guards, build-and-test, docker-build-validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Microsoft Container Registry
        uses: docker/login-action@v3
        with:
          registry: mcr.microsoft.com

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build platform images
        run: docker compose -f deploy/docker/docker-compose.yaml build
        env:
          HM_SQL_SA_PASSWORD: ${{ secrets.HM_SQL_SA_PASSWORD }}
          HM_JWT_SIGNING_KEY: ${{ secrets.HM_JWT_SIGNING_KEY }}
          HM_AUDIT_HMAC_KEY: ${{ secrets.HM_AUDIT_HMAC_KEY }}
          HM_AGENT_GATEWAY_API_KEY: ${{ secrets.HM_AGENT_GATEWAY_API_KEY }}
          HM_SEQ_ADMIN_PASSWORD: ${{ secrets.HM_SEQ_ADMIN_PASSWORD }}
          HM_BOOTSTRAP_ADMIN_ENABLED: "false"
          HM_BOOTSTRAP_ADMIN_USERNAME: "ci-admin"
          HM_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.HM_BOOTSTRAP_ADMIN_PASSWORD }}

      - name: Start platform stack
        run: docker compose -f deploy/docker/docker-compose.yaml up -d
        env:
          HM_SQL_SA_PASSWORD: ${{ secrets.HM_SQL_SA_PASSWORD }}
          HM_JWT_SIGNING_KEY: ${{ secrets.HM_JWT_SIGNING_KEY }}
          HM_AUDIT_HMAC_KEY: ${{ secrets.HM_AUDIT_HMAC_KEY }}
          HM_AGENT_GATEWAY_API_KEY: ${{ secrets.HM_AGENT_GATEWAY_API_KEY }}
          HM_SEQ_ADMIN_PASSWORD: ${{ secrets.HM_SEQ_ADMIN_PASSWORD }}
          HM_BOOTSTRAP_ADMIN_ENABLED: "true"
          HM_BOOTSTRAP_ADMIN_USERNAME: "ci-admin"
          HM_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.HM_BOOTSTRAP_ADMIN_PASSWORD }}

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for platform services..."
          for i in $(seq 1 60); do
            healthy=$(docker compose -f deploy/docker/docker-compose.yaml ps --format json | jq -r '.Health // "unknown"' | grep -c "healthy" || true)
            total=$(docker compose -f deploy/docker/docker-compose.yaml ps --format json | jq -r '.Health // "unknown"' | grep -c "healthy\|unhealthy\|starting" || true)
            echo "  Attempt $i: $healthy healthy services"
            if [ "$healthy" -ge 5 ]; then
              echo "All application services healthy"
              break
            fi
            sleep 5
          done
          docker compose -f deploy/docker/docker-compose.yaml ps

      - name: Run platform smoke tests
        env:
          HM_BOOTSTRAP_ADMIN_USERNAME: "ci-admin"
          HM_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.HM_BOOTSTRAP_ADMIN_PASSWORD }}
          # Action1 and Prometheus integrations are disabled in CI (no external services).
          # To enable Action1 in a pipeline that has access to the API, set:
          #   HM_ACTION1_ENABLED: "true" and add HM_ACTION1_API_KEY / HM_ACTION1_WEBHOOK_SECRET secrets.
          HM_ACTION1_ENABLED: "false"
          HM_PROMETHEUS_ENABLED: "false"
        run: >-
          dotnet test
          tests/HomeManagement.Platform.Tests
          --configuration Release
          --filter "Category=Platform"
          --logger "trx;LogFileName=platform-results.trx"
          --results-directory ./TestResults

      - name: Upload platform test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: platform-test-results
          path: ./TestResults/**/*.trx
          retention-days: 30

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deploy/docker/docker-compose.yaml logs

      - name: Stop platform stack
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yaml down -v
        env:
          HM_SQL_SA_PASSWORD: ${{ secrets.HM_SQL_SA_PASSWORD }}
          HM_JWT_SIGNING_KEY: ${{ secrets.HM_JWT_SIGNING_KEY }}
          HM_AUDIT_HMAC_KEY: ${{ secrets.HM_AUDIT_HMAC_KEY }}
          HM_AGENT_GATEWAY_API_KEY: ${{ secrets.HM_AGENT_GATEWAY_API_KEY }}
          HM_SEQ_ADMIN_PASSWORD: ${{ secrets.HM_SEQ_ADMIN_PASSWORD }}
          HM_BOOTSTRAP_ADMIN_ENABLED: "false"
          HM_BOOTSTRAP_ADMIN_USERNAME: "ci-admin"
          HM_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.HM_BOOTSTRAP_ADMIN_PASSWORD }}
