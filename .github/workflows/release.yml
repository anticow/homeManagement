name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  HELM_VERSION: '3.17.2'
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test
          --no-build
          --configuration Release
          --filter "Category!=Platform"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint chart
        run: >-
          helm lint deploy/helm/homemanagement
          --set database.connectionString="Server=sql;Database=HomeManagement;User Id=sa;Password=ValidationPassword_123!;Encrypt=True;TrustServerCertificate=False;"
          --set auth.jwtSigningKey="validation-signing-key-that-is-long-enough-for-ci-checks-1234567890"
          --set agentGateway.apiKey="validation-agent-gateway-api-key"

      - name: Verify chart fails without required secret values
        run: >-
          ! helm template homemanagement deploy/helm/homemanagement

      - name: Render chart
        run: >-
          helm template homemanagement deploy/helm/homemanagement
          --set database.connectionString="Server=sql;Database=HomeManagement;User Id=sa;Password=ValidationPassword_123!;Encrypt=True;TrustServerCertificate=False;"
          --set auth.jwtSigningKey="validation-signing-key-that-is-long-enough-for-ci-checks-1234567890"
          --set agentGateway.apiKey="validation-agent-gateway-api-key"
          > /tmp/homemanagement-rendered.yaml

  publish-binaries:
    name: Publish (${{ matrix.rid }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - rid: win-x64
            agent-project: src/HomeManagement.Agent/HomeManagement.Agent.csproj
            gui-project: src/HomeManagement.Gui/HomeManagement.Gui.csproj
          - rid: linux-x64
            agent-project: src/HomeManagement.Agent/HomeManagement.Agent.csproj
            gui-project: src/HomeManagement.Gui/HomeManagement.Gui.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish Agent
        run: >-
          dotnet publish ${{ matrix.agent-project }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/agent-${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true

      - name: Publish GUI
        run: >-
          dotnet publish ${{ matrix.gui-project }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/gui-${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true

      - name: Archive Agent
        run: |
          cd ./publish
          tar -czf homemanagement-agent-${{ matrix.rid }}-${{ steps.version.outputs.version }}.tar.gz agent-${{ matrix.rid }}/

      - name: Archive GUI
        run: |
          cd ./publish
          tar -czf homemanagement-gui-${{ matrix.rid }}-${{ steps.version.outputs.version }}.tar.gz gui-${{ matrix.rid }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.rid }}
          path: ./publish/*.tar.gz
          retention-days: 90

  docker-images:
    name: Docker (${{ matrix.repository }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - image: agent
            repository: hm-agent
            dockerfile: docker/agent.Dockerfile
            context: .
          - image: broker
            repository: hm-broker
            dockerfile: docker/broker.Dockerfile
            context: .
          - image: auth
            repository: hm-auth
            dockerfile: docker/auth.Dockerfile
            context: .
          - image: web
            repository: hm-web
            dockerfile: docker/web.Dockerfile
            context: .
          - image: gateway
            repository: hm-gateway
            dockerfile: docker/gateway.Dockerfile
            context: .
          - image: agent-gw
            repository: hm-agent-gw
            dockerfile: docker/agent-gw.Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.repository }}:latest

  create-release:
    name: Create Release
    needs: [publish-binaries, docker-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: HomeManagement ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ./artifacts/*.tar.gz

  deploy:
    name: Deploy (bump image tag)
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip for pre-releases (e.g. v1.2.0-rc.1) — only auto-deploy stable releases
    if: ${{ !contains(github.ref_name, '-') }}

    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump imageTag in values-production.yaml
        run: |
          sed -i 's/^  imageTag: .*/  imageTag: "${{ steps.version.outputs.version }}"/' deploy/argocd/values-production.yaml

      - name: Commit and push updated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/argocd/values-production.yaml
          git diff --staged --quiet && echo "No tag change to commit" && exit 0
          git commit -m "chore: deploy ${{ steps.version.outputs.version }} [skip ci]"
          git push origin master
