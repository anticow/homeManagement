name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/homemanagement

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

  publish-binaries:
    name: Publish (${{ matrix.rid }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - rid: win-x64
            agent-project: src/HomeManagement.Agent/HomeManagement.Agent.csproj
            gui-project: src/HomeManagement.Gui/HomeManagement.Gui.csproj
          - rid: linux-x64
            agent-project: src/HomeManagement.Agent/HomeManagement.Agent.csproj
            gui-project: src/HomeManagement.Gui/HomeManagement.Gui.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish Agent
        run: >-
          dotnet publish ${{ matrix.agent-project }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/agent-${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true

      - name: Publish GUI
        run: >-
          dotnet publish ${{ matrix.gui-project }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/gui-${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true

      - name: Archive Agent
        run: |
          cd ./publish
          tar -czf homemanagement-agent-${{ matrix.rid }}-${{ steps.version.outputs.version }}.tar.gz agent-${{ matrix.rid }}/

      - name: Archive GUI
        run: |
          cd ./publish
          tar -czf homemanagement-gui-${{ matrix.rid }}-${{ steps.version.outputs.version }}.tar.gz gui-${{ matrix.rid }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: ./publish/*.tar.gz
          retention-days: 90

  docker-images:
    name: Docker (${{ matrix.image }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - image: agent
            dockerfile: docker/agent.Dockerfile
            context: .
          - image: broker
            dockerfile: docker/broker.Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest

  create-release:
    name: Create Release
    needs: [publish-binaries, docker-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HomeManagement ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ./artifacts/*.tar.gz
