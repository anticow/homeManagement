version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dotnet-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      grpc:
        patterns:
          - "Grpc.*"
          - "Google.Protobuf"
      avalonia:
        patterns:
          - "Avalonia*"
      serilog:
        patterns:
          - "Serilog*"
      quartz:
        patterns:
          - "Quartz*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "NSubstitute"
          - "FluentAssertions"
          - "coverlet.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
