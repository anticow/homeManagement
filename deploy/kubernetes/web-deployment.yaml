apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-web
  namespace: homemanagement
  labels:
    app: hm-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hm-web
  template:
    metadata:
      labels:
        app: hm-web
    spec:
      containers:
        - name: web
          image: ghcr.io/homemanagement/hm-web:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: BrokerApi__BaseUrl
              value: "http://hm-broker:8082"
            - name: Auth__Authority
              value: "http://hm-auth:8083"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
