apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-gateway
  namespace: homemanagement
  labels:
    app: hm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hm-gateway
  template:
    metadata:
      labels:
        app: hm-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/homemanagement/hm-gateway:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8081"
            - name: Auth__JwtSigningKey
              valueFrom:
                secretKeyRef:
                  name: hm-auth-secret
                  key: jwt-signing-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
