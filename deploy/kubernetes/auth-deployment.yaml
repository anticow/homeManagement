apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-auth
  namespace: homemanagement
  labels:
    app: hm-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hm-auth
  template:
    metadata:
      labels:
        app: hm-auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/homemanagement/hm-auth:latest
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8083"
            - name: ConnectionStrings__HomeManagement
              valueFrom:
                secretKeyRef:
                  name: hm-db-secret
                  key: connection-string
            - name: Auth__JwtSigningKey
              valueFrom:
                secretKeyRef:
                  name: hm-auth-secret
                  key: jwt-signing-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
