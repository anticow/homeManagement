apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-broker
  namespace: homemanagement
  labels:
    app: hm-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hm-broker
  template:
    metadata:
      labels:
        app: hm-broker
    spec:
      containers:
        - name: broker
          image: ghcr.io/homemanagement/hm-broker:latest
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8082"
            - name: ConnectionStrings__HomeManagement
              valueFrom:
                secretKeyRef:
                  name: hm-db-secret
                  key: connection-string
            - name: Auth__JwtSigningKey
              valueFrom:
                secretKeyRef:
                  name: hm-auth-secret
                  key: jwt-signing-key
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
