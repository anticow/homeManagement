{{- $svcName := "hm-gateway" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svcName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
    app: {{ $svcName }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: {{ $svcName }}
  template:
    metadata:
      labels:
        app: {{ $svcName }}
    spec:
      {{- if .Values.global.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "homemanagement.image" (dict "global" .Values.global "image" .Values.gateway.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              name: http
          env:
            - name: APP_VERSION
              value: {{ .Values.gateway.image.tag | default .Values.global.imageTag | quote }}
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.gateway.port }}"
            - name: Auth__JwtSigningKey
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: jwt-signing-key
            - name: Auth__Issuer
              value: {{ .Values.auth.issuer | quote }}
            - name: Auth__Audience
              value: {{ .Values.auth.audience | quote }}
            - name: ReverseProxy__Clusters__broker__Destinations__primary__Address
              value: "http://hm-broker:{{ .Values.broker.port }}"
            - name: ReverseProxy__Clusters__auth__Destinations__primary__Address
              value: "http://hm-auth:{{ .Values.authService.port }}"
            - name: Seq__Url
              value: {{ .Values.seq.url | quote }}
            - name: PlatformHealth__BrokerUrl
              value: "http://hm-broker:{{ .Values.broker.port }}/healthz"
            - name: PlatformHealth__AuthUrl
              value: "http://hm-auth:{{ .Values.authService.port }}/healthz"
            - name: PlatformHealth__WebUrl
              value: "http://hm-web:{{ .Values.web.port }}/healthz"
            - name: PlatformHealth__AgentGatewayUrl
              value: "http://hm-agent-gw:{{ .Values.agentGateway.apiPort }}/healthz"
            {{- if .Values.healthPage.enabled }}
            - name: PlatformHealth__SeqUrl
              value: {{ .Values.healthPage.platformHealth.seqUrl | quote }}
            - name: PlatformHealth__PrometheusUrl
              value: {{ .Values.healthPage.platformHealth.prometheusUrl | quote }}
            - name: PlatformHealth__GrafanaUrl
              value: {{ .Values.healthPage.platformHealth.grafanaUrl | quote }}
            - name: PlatformHealth__ArgoCDUrl
              value: {{ .Values.healthPage.platformHealth.argoCDUrl | quote }}
            - name: PlatformHealth__AwxUrl
              value: {{ .Values.healthPage.platformHealth.awxUrl | quote }}
            {{- end }}
            - name: Serilog__MinimumLevel__Default
              value: {{ .Values.serilog.minimumLevel | quote }}
            - name: Serilog__MinimumLevel__Override__Microsoft.AspNetCore
              value: {{ .Values.serilog.overrides.microsoftAspNetCore | quote }}
            - name: Serilog__MinimumLevel__Override__System.Net.Http
              value: {{ .Values.serilog.overrides.systemNetHttp | quote }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
{{- if .Values.gateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svcName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svcName }}
  minReplicas: {{ .Values.gateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.gateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
