{{- $svcName := "hm-web" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svcName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
    app: {{ $svcName }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ $svcName }}
  template:
    metadata:
      labels:
        app: {{ $svcName }}
    spec:
      {{- if .Values.global.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}
      containers:
        - name: web
          image: {{ include "homemanagement.image" (dict "global" .Values.global "image" .Values.web.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
              name: http
          env:
            - name: APP_VERSION
              value: {{ .Values.web.image.tag | default .Values.global.imageTag | quote }}
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.web.port }}"
            - name: BrokerApi__BaseUrl
              value: "http://hm-broker:{{ .Values.broker.port }}"
            - name: AuthApi__BaseUrl
              value: "http://hm-auth:{{ .Values.authService.port }}"
            - name: Seq__Url
              value: {{ .Values.seq.url | quote }}
            - name: Serilog__MinimumLevel__Default
              value: {{ .Values.serilog.minimumLevel | quote }}
            - name: Serilog__MinimumLevel__Override__Microsoft.AspNetCore
              value: {{ .Values.serilog.overrides.microsoftAspNetCore | quote }}
            - name: Serilog__MinimumLevel__Override__System.Net.Http
              value: {{ .Values.serilog.overrides.systemNetHttp | quote }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
{{- if .Values.web.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svcName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svcName }}
  minReplicas: {{ .Values.web.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.web.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.web.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
