apiVersion: v1
kind: Secret
metadata:
  name: hm-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
type: Opaque
stringData:
  connection-string: {{ required "database.connectionString is required" .Values.database.connectionString | quote }}
  jwt-signing-key: {{ required "auth.jwtSigningKey is required" .Values.auth.jwtSigningKey | quote }}
  agent-gateway-api-key: {{ required "agentGateway.apiKey is required" .Values.agentGateway.apiKey | quote }}
  agent-gateway-agent-api-keys.json: {{ required "agentGateway.agentApiKeysJson is required" .Values.agentGateway.agentApiKeysJson | quote }}
  {{- if .Values.auth.bootstrapAdmin.enabled }}
  bootstrap-admin-password: {{ .Values.auth.bootstrapAdmin.password | quote }}
  {{- end }}
  {{- if .Values.action1.enabled }}
  action1-api-key: {{ required "action1.apiKey is required when action1.enabled is true" .Values.action1.apiKey | quote }}
  action1-webhook-secret: {{ required "action1.webhookSecret is required when action1.enabled is true" .Values.action1.webhookSecret | quote }}
  {{- end }}
{{- if .Values.global.imagePullSecret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "homemanagement.dockerconfigjson" . | b64enc | quote }}
{{- end }}
