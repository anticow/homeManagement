{{- $svcName := "hm-broker" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svcName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homemanagement.labels" . | nindent 4 }}
    app: {{ $svcName }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  selector:
    matchLabels:
      app: {{ $svcName }}
  template:
    metadata:
      labels:
        app: {{ $svcName }}
    spec:
      {{- if .Values.global.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}
      containers:
        - name: broker
          image: {{ include "homemanagement.image" (dict "global" .Values.global "image" .Values.broker.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.broker.port }}
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.broker.port }}"
            - name: ConnectionStrings__HomeManagement
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: connection-string
            - name: Auth__JwtSigningKey
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: jwt-signing-key
            - name: Auth__Issuer
              value: {{ .Values.auth.issuer | quote }}
            - name: Auth__Audience
              value: {{ .Values.auth.audience | quote }}
            - name: AgentGateway__BaseUrl
              value: "http://hm-agent-gw:{{ .Values.agentGateway.apiPort }}"
            - name: AgentGateway__ApiKey
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: agent-gateway-api-key
            - name: Seq__Url
              value: {{ .Values.seq.url | quote }}
            - name: Action1__Enabled
              value: {{ .Values.action1.enabled | quote }}
            - name: Action1__OrganizationId
              value: {{ .Values.action1.organizationId | quote }}
            - name: Action1__BaseUrl
              value: {{ .Values.action1.baseUrl | quote }}
            - name: Action1__SyncIntervalMinutes
              value: {{ .Values.action1.syncIntervalMinutes | quote }}
            {{- if .Values.action1.enabled }}
            - name: Action1__ApiKey
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: action1-api-key
            - name: Action1__WebhookSecret
              valueFrom:
                secretKeyRef:
                  name: hm-secrets
                  key: action1-webhook-secret
            {{- end }}
            - name: Prometheus__Enabled
              value: {{ .Values.prometheus.enabled | quote }}
            - name: Prometheus__Url
              value: {{ .Values.prometheus.url | quote }}
            - name: Prometheus__ScrapeLabel
              value: {{ .Values.prometheus.scrapeLabel | quote }}
            - name: Prometheus__QueryTimeoutSeconds
              value: {{ .Values.prometheus.queryTimeoutSeconds | quote }}
            - name: Serilog__MinimumLevel__Default
              value: {{ .Values.serilog.minimumLevel | quote }}
            - name: Serilog__MinimumLevel__Override__Microsoft.AspNetCore
              value: {{ .Values.serilog.overrides.microsoftAspNetCore | quote }}
            - name: Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore
              value: {{ .Values.serilog.overrides.microsoftEntityFrameworkCore | quote }}
            - name: Serilog__MinimumLevel__Override__System.Net.Http
              value: {{ .Values.serilog.overrides.systemNetHttp | quote }}
          resources:
            {{- toYaml .Values.broker.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
