syntax = "proto3";

package homemanagement.agent.v1;

option csharp_namespace = "HomeManagement.Transport.Protocol";

// The single bidirectional service.
// Agent opens outbound stream; controller sends commands down it.
service AgentHub {
  rpc Connect (stream AgentMessage) returns (stream ControlMessage);
}

// ── Agent → Controller ──

message AgentMessage {
  oneof payload {
    Handshake       handshake        = 1;
    Heartbeat       heartbeat        = 2;
    CommandResponse command_response = 3;
  }
}

message Handshake {
  string agent_id          = 1;
  string hostname          = 2;
  string agent_version     = 3;
  string os_type           = 4;  // "Windows" | "Linux"
  string os_version        = 5;
  string architecture      = 6;  // "x64" | "arm64"
  int32  protocol_version  = 7;  // incremented on breaking wire changes
}

message Heartbeat {
  string agent_id           = 1;
  int64  uptime_seconds     = 2;
  double cpu_percent        = 3;
  int64  memory_used_bytes  = 4;
  int64  memory_total_bytes = 5;
  int64  disk_free_bytes    = 6;
  string timestamp_utc      = 7;  // ISO 8601
}

message CommandResponse {
  string request_id     = 1;
  int32  exit_code      = 2;
  string stdout         = 3;
  string stderr         = 4;
  int64  duration_ms    = 5;
  bool   timed_out      = 6;
  string result_json    = 7;  // structured payload for typed commands
  string error_category = 8;  // maps to ErrorCategory enum
  string correlation_id = 9;  // echoed from CommandRequest for tracing
}

// ── Controller → Agent ──

message ControlMessage {
  oneof payload {
    CommandRequest  command_request  = 1;
    UpdateDirective update_directive = 2;
    Shutdown        shutdown         = 3;
    Ack             ack              = 4;
  }
}

message CommandRequest {
  string request_id       = 1;
  string command_type     = 2;  // "Shell" | "PatchScan" | "PatchApply" | "ServiceControl" | "SystemInfo"
  string command_text     = 3;  // raw command (Shell only)
  string parameters_json  = 4;  // typed parameters for domain commands
  int32  timeout_seconds  = 5;
  string elevation_mode   = 6;  // "None" | "Sudo" | "SudoAsUser" | "RunAsAdmin"
  string run_as_user      = 7;
  map<string, string> env = 8;
  string correlation_id   = 9;
}

message UpdateDirective {
  string target_version    = 1;
  string download_url      = 2;
  bytes  binary_sha256     = 3;
  bytes  signature_ed25519 = 4;
  bool   force             = 5;
}

message Shutdown {
  string reason   = 1;
  int32  delay_ms = 2;
}

message Ack {
  string in_response_to     = 1;  // "handshake" | "heartbeat"
  string controller_version = 2;
}
